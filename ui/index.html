<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Email Summarizer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <section class="hero">
      <div class="hero__top">
        <div class="hero__badge">AI Powered Text Summary</div>
        <button class="theme-toggle" id="themeToggle" type="button">🌙 Dark Mode</button>
      </div>

      <h1>Smart Email Summarizer</h1>
      <p>Paste text or upload a text file and generate a clean summary.</p>
    </section>

    <section class="layout">
      <div class="card">
        <div class="tabs">
          <button class="tab active" id="textTab" type="button">Text Input</button>
          <button class="tab" id="fileTab" type="button">File Upload</button>
        </div>

        <div id="textPanel">
        <h2 class="card__title card__title--spaced">Email or Article Text</h2>

          <!-- <label for="inputText">Email or Article Text</label> -->
          <textarea id="inputText" placeholder="Paste your long email or article here..."></textarea>

          <div class="meta">
            <span id="charCount">0 characters</span>
            <span>Minimum 300 characters recommended</span>
          </div>
        </div>

        <div id="filePanel" class="hidden">
         <h2 class="card__title card__title--spaced">Upload File</h2>
          <div class="file-upload-box">
            
            <label for="fileInput" class="custom-file-btn">Select Text File</label>
            <input type="file" id="fileInput" accept=".txt" class="file-input" />
            <p class="file-info" id="fileInfo">No file selected</p>
        </div>

         
        </div>

        <div class="controls">
          <div>
            <label for="maxLength">Max Length</label>
            <input type="number" id="maxLength" value="150" min="20" max="250" />
          </div>

          <div>
            <label for="minLength">Min Length</label>
            <input type="number" id="minLength" value="30" min="0" max="150" />
          </div>
        </div>

        <button class="btn" id="summarizeBtn" type="button">Generate Summary</button>
        <p class="error" id="errorMessage"></p>
      </div>

      <aside class="card">
        <h2 class="card__title">Summary</h2>
        <div class="spinner" id="spinner"></div>

        <div class="summary" id="summaryBox">
          <p id="summaryResult" class="muted">Your generated summary will appear here.</p>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
